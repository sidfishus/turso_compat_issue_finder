# Targeted SQL for COMPAT.md ❌ / 🚧 rows (SQL query language only).
# Keys match the subject column in COMPAT.md tables.
# Auto-generated cases cover PRAGMA rows; this file covers statements/expressions/functions.

"WITH clause":
  setup: |
    CREATE TABLE t(a INT, b INT);
    INSERT INTO t VALUES (1, 2), (2, 3);
  sql: |
    WITH RECURSIVE c(x) AS (
      SELECT 1
      UNION ALL
      SELECT x + 1 FROM c WHERE x < 3
    )
    SELECT x FROM c ORDER BY x;

"WINDOW functions":
  setup: |
    CREATE TABLE t(x INT);
    INSERT INTO t VALUES (1), (2), (3);
  sql: SELECT rank() OVER (ORDER BY x) FROM t;

"GENERATED":
  sql: CREATE TABLE t(a INT GENERATED ALWAYS AS (a + 1) VIRTUAL);

"WITHOUT ROWID":
  sql: CREATE TABLE t(a INT PRIMARY KEY, b TEXT) WITHOUT ROWID;

"CREATE TRIGGER ... INSTEAD OF":
  setup: |
    CREATE TABLE base(a INT);
    CREATE VIEW v AS SELECT a FROM base;
  sql: |
    CREATE TRIGGER tr INSTEAD OF INSERT ON v BEGIN
      INSERT INTO base(a) VALUES (NEW.a);
    END;

"CREATE VIEW IF NOT EXISTS":
  setup: CREATE VIEW v AS SELECT 1 AS x;
  sql: CREATE VIEW IF NOT EXISTS v AS SELECT 2 AS x;

"VACUUM":
